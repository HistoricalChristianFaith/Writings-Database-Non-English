<h3>DE PERFECTIONE EVANGELICA</h3>
<br>
Volentes circa evangelicam perfectionem aliqua indagare, primo exordium inquisitionis nostrae sumendum est ab humilitate.<br>
<br>
Et primo quaeramus de ipsa tanquam de totius perfectionis radice.<br>
<br>
Secundo, de paupertate. Tertio, de continentia. Quarto, de obedientia.<br>
<br>
